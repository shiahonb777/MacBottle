name: Bug Report
description: Report a bug in MacBottle itself (not a specific game compatibility issue).
type: "Bug"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        If a specific game fails to run, use the **Recipe Request** template
        instead. Use this template only for bugs in MacBottle's UI, bottle
        management, or core functionality.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered, deterministic steps that reliably trigger the bug.
    validations:
      required: true

  - type: textarea
    id: expected-behaviour
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: MacBottle log excerpts if relevant. Redact personal paths.
      render: bash

  - type: input
    id: macbottle-version
    attributes:
      label: MacBottle version
      description: Shown in About > MacBottle.
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "15.1"
    validations:
      required: true

  - type: input
    id: chip
    attributes:
      label: Apple Silicon chip
      placeholder: M4 Pro
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: Issue Language
      description: Issues must be in plain English so all maintainers can read them.
      options:
        - label: My issue is written in English
          required: true
