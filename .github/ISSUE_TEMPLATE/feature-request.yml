name: Feature Request
description: Propose a new feature for MacBottle.
type: "Enhancement"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests that fit MacBottle's scope (making Windows games
        runnable on Apple Silicon) are welcome. Out-of-scope requests —
        bundled game stores, cloud gaming, anti-cheat workarounds, mobile
        ports — will be closed with a pointer to `PROJECT_PLAN.md`.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should MacBottle solve it? Concrete UI / API sketches encouraged.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you rejected, and why.

  - type: checkboxes
    attributes:
      label: Issue Language
      description: Issues must be in plain English so all maintainers can read them.
      options:
        - label: My issue is written in English
          required: true
